<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothy — скоро запуск</title>
<style>
  :root {
    --app-bg: #ffffff;
    --app-text: #111111;
    --app-muted: #737373;
    --app-border: #e5e5e5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--app-bg);
    color: var(--app-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 96px;
    height: 96px;
    object-fit: contain;
    margin: 0 auto 28px;
    filter: grayscale(100%) contrast(1.05);
    display: block;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  p {
    font-size: 15px;
    color: var(--app-muted);
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--app-text);
    opacity: 0.15;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.15; }
    40% { opacity: 1; }
  }
  .divider {
    width: 32px;
    height: 1px;
    background: var(--app-border);
    margin: 0 auto 28px;
  }
  a.tg-link {
    display: inline-block;
    border: 1px solid var(--app-text);
    color: var(--app-text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 28px;
    border-radius: 999px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  a.tg-link:hover {
    background: var(--app-text);
    color: var(--app-bg);
  }
  footer {
    margin-top: 36px;
    font-size: 12px;
    color: var(--app-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Clothy">
    <h1>Clothy</h1>
    <div class="dots"><span></span><span></span><span></span></div>
    <p>Сайт в разработке.<br>Сейчас мы тестируем мини-приложение в Telegram.</p>
    <div class="divider"></div>
    <a class="tg-link" href="https://t.me/Clothy_by_bot" target="_blank" rel="noopener">Открыть в Telegram</a>
    <footer>CLOTHY.BY</footer>
  </div>
</body>
</html>
